<!DOCTYPE html>
<html>
<head>
<title>Sign Up - OtakuEats</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="signup.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

</head>

<body>
<nav>
<div class="logo">
<a href="../index.html">
<img src="../images/logo.png">
</a>
</div>

<ul class="nav-menu">
<li><a href="../index.html">Home</a></li>
<li><a href="../about/about.html">About</a></li>
<li><a href="login.html" class="active">Login</a></li>
</ul>
</nav>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="welcome-box">
<h2 id="typingText"></h2>
</div>

<img src="delivery.svg">

<h2 class="join-text">Join the <span>Food Journey</span></h2>
<p class="sub-text">Create your account & explore taste</p>

</div>

<!-- RIGHT -->
<div class="right">

<div class="login-card">

<h2>Sign Up</h2>

<input type="text" id="name" placeholder="Username" required>
<input type="email" id="email" placeholder="Email" required>

<div class="password-box">
<input type="password" id="password" placeholder="Password" minlength="6">
<i class="ri-eye-line" id="toggle"></i>
</div>

<button id="signupBtn">Sign Up</button>

<p class="success" id="successMsg"></p>

<p class="signup">
Already have an account? <a href="login.html">Login</a>
</p>

</div>

</div>

</div>

<script src="signup.js"></script>

</body>
</html>
