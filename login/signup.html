<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - OtakuEats</title>
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="signup.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<nav>
  <div class="logo">
    <a href="../index.html"><img src="../images/logo.png"></a>
  </div>
  <ul class="nav-menu">
    <li><a href="../index.html">Home</a></li>
    <li><a href="../about/about.html">About</a></li>
    <li><a href="login.html" class="active">Login</a></li>
  </ul>
</nav>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="welcome-box">
      <h2 id="typingText"></h2>
    </div>
    <img src="delivery.svg" class="delivery-img">
    <h2 class="join-text">Join the <span>Food Journey</span></h2>
    <p class="sub-text">Create your account &amp; explore taste</p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="login-card">

      <div class="card-logo">✨</div>
      <h2>Sign Up</h2>

      <div class="input-group">
        <span class="input-icon"><i class="ri-user-line"></i></span>
        <input type="text" id="name" placeholder="Username" required autocomplete="username">
      </div>

      <div class="input-group">
        <span class="input-icon"><i class="ri-mail-line"></i></span>
        <input type="email" id="email" placeholder="Email" required autocomplete="email">
      </div>

      <div class="input-group password-box">
        <span class="input-icon"><i class="ri-lock-line"></i></span>
        <input type="password" id="password" placeholder="Password" minlength="6" autocomplete="new-password">
        <i class="ri-eye-line" id="toggle"></i>
      </div>

      <button id="signupBtn">
        <span class="btn-text">Create Account</span>
        <span class="btn-arrow">→</span>
      </button>

      <p class="success" id="successMsg"></p>

      <p class="signup">
        Already have an account? <a href="login.html">Login</a>
      </p>

    </div>
  </div>

</div>

<script src="signup.js"></script>
</body>
</html>
