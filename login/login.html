<!DOCTYPE html>
<html>
<head>
<title>Login - OtakuEats</title>

<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

</head>

<body>

<nav>
<div class="logo">
<a href="../index.html">
<img src="../images/logo.png">
</a>
</div>

<ul class="nav-menu">
<li><a href="../index.html">Home</a></li>
<li><a href="../about/about.html">About</a></li>
<li><a href="login.html" class="active">Login</a></li>
</ul>
</nav>

<div class="container">

<div class="left">

<div class="welcome-box">
<h2 id="typingText"></h2>
</div>

<img src="delivery.svg">

<p class="welcome-text">Login to continue your food journey</p>

</div>

<div class="right">

<div class="login-card">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email" required>
<div class="password-box">
<input type="password" id="password" placeholder="Password" required minlength="6">
<i class="ri-eye-line" id="toggle"></i>
</div>

<button id="loginBtn">Login</button>

<p class="welcome" id="welcomeMsg"></p>

<p class="signup">
Don’t have an account? <a href="signup.html">Sign Up</a>
</p>

</div>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
